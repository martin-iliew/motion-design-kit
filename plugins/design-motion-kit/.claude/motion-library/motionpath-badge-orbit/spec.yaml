  type: element
timing:
  duration: base
  easing: entrance
trigger:
  type: load
a11y:
  reduced_motion: instant-final
plugins:
- llms
- motionpath
config:
  root: '[data-motion="motionpath-badge-orbit"]'
  items: '[data-motion="motionpath-badge-orbit"] [data-motion-item]'
