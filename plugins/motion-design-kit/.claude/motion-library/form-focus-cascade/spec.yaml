version: '1'
type: tween
id: form-focus-cascade
target:
  selector: '[data-motion="form-focus-cascade"]'
  type: element
timing:
  duration: base
  easing: transition
trigger:
  type: click
a11y:
  reduced_motion: instant-final
plugins:
- llms
config:
  root: '[data-motion="form-focus-cascade"]'
  items: '[data-motion="form-focus-cascade"] [data-motion-item]'
  target: '[data-motion="form-focus-cascade"] [data-motion-target]'
  path: '[data-motion="form-focus-cascade"] [data-motion-path]'
