version: '1'
type: tween
id: drawer-spring-slide
target:
  selector: '[data-motion="drawer-spring-slide"]'
  type: element
timing:
  duration: base
  easing: transition
trigger:
  type: click
a11y:
  reduced_motion: instant-final
plugins:
- llms
config:
  root: '[data-motion="drawer-spring-slide"]'
  items: '[data-motion="drawer-spring-slide"] [data-motion-item]'
  target: '[data-motion="drawer-spring-slide"] [data-motion-target]'
  path: '[data-motion="drawer-spring-slide"] [data-motion-path]'
